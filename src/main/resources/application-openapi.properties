# Ative este profile com: -Dspring-boot.run.profiles=openapi
# Propriedades específicas para habilitar e configurar o Swagger/OpenAPI (SpringDoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operationsSorter=alpha

# Opcional: limitar endpoints de gerenciamento quando o profile estiver ativo
management.endpoints.web.exposure.include=health,info
